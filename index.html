<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos OS</title>

<style>

body{
background:black;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.phone{
width:320px;
height:650px;
background:#111;
border-radius:40px;
box-shadow:0 0 40px black;
overflow:hidden;
position:relative;
}

.screen{
width:100%;
height:100%;
background:linear-gradient(180deg,#1a1a1a,#000);
padding:20px;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:40px;
}

.app{
text-align:center;
cursor:pointer;
}

.icon{
width:55px;
height:55px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
margin:auto;
margin-bottom:6px;
}

.ai{background:#3b82f6;}
.games{background:#10b981;}
.chaos{background:#a855f7;}
.logs{background:#f59e0b;}

.label{
font-size:12px;
}

.appScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:20px;
box-sizing:border-box;
display:none;
}

.back{
margin-bottom:20px;
cursor:pointer;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<div class="phone">

<div class="screen" id="home">

<h2>Chaos OS</h2>

<div class="grid">

<div class="app" onclick="openApp('aiApp')">
<div class="icon ai">🧠</div>
<div class="label">AI</div>
</div>

<div class="app" onclick="openApp('gamesApp')">
<div class="icon games">🎮</div>
<div class="label">Games</div>
</div>

<div class="app" onclick="openApp('chaosApp')">
<div class="icon chaos">🌌</div>
<div class="label">Chaos</div>
</div>

<div class="app" onclick="openApp('logsApp')">
<div class="icon logs">📜</div>
<div class="label">Logs</div>
</div>

</div>
</div>


<!-- AI APP -->

<div class="appScreen" id="aiApp">

<div class="back" onclick="goHome()">← Back</div>

<h2>AI Interface</h2>

<p>AI module coming soon.</p>

</div>


<!-- GAMES APP -->

<div class="appScreen" id="gamesApp">

<div class="back" onclick="goHome()">← Back</div>

<h2>Games</h2>

<p>No games installed.</p>

</div>


<!-- CHAOS APP -->

<div class="appScreen" id="chaosApp">

<div class="back" onclick="goHome()">← Back</div>

<h2>Chaos Engine</h2>

<button onclick="chaos()">Trigger Chaos</button>

<p id="chaosResult"></p>

</div>


<!-- LOGS APP -->

<div class="appScreen" id="logsApp">

<div class="back" onclick="goHome()">← Back</div>

<h2>System Logs</h2>

<p>No logs yet.</p>

</div>


</div>


<script>

function openApp(id){

document.getElementById("home").style.display="none";

document.getElementById(id).style.display="block";

}

function goHome(){

document.querySelectorAll(".appScreen").forEach(app=>{
app.style.display="none";
});

document.getElementById("home").style.display="block";

}

function chaos(){

const events=[
"Reality glitch detected",
"Anomaly appeared",
"Chaos level increased",
"Unknown signal received",
"System instability rising"
];

const random=events[Math.floor(Math.random()*events.length)];

document.getElementById("chaosResult").innerText=random;

}

</script>

</body>
</html>
