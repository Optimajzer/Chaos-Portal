<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos OS</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PHONE */

.phone{
width:360px;
height:720px;
border-radius:45px;
overflow:hidden;
position:relative;
box-shadow:0 0 80px black;
}

/* WALLPAPER */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,#ff4ecd,transparent 40%),
radial-gradient(circle at 80% 30%,#4e8cff,transparent 40%),
radial-gradient(circle at 50% 80%,#00ffa6,transparent 40%),
black;
filter:saturate(1.3);
}

/* STATUS BAR */

.status{
position:absolute;
top:0;
width:100%;
height:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
box-sizing:border-box;
color:white;
font-size:14px;
z-index:5;
}

/* PAGES */

.pages{
position:absolute;
top:40px;
width:200%;
height:100%;
display:flex;
transition:0.4s;
}

/* PAGE */

.page{
width:100%;
padding:30px;
box-sizing:border-box;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:26px;
color:white;
}

/* APP ICON */

.app{
text-align:center;
cursor:pointer;
}

.icon{
width:64px;
height:64px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.label{
font-size:12px;
margin-top:6px;
}

/* COLORS */

.ai{background:linear-gradient(#5a9cff,#2a6cff);}
.games{background:linear-gradient(#34d399,#059669);}
.chaos{background:linear-gradient(#c084fc,#7c3aed);}
.logs{background:linear-gradient(#fbbf24,#f59e0b);}
.browser{background:linear-gradient(#60a5fa,#2563eb);}
.settings{background:linear-gradient(#9ca3af,#4b5563);}

/* DOCK */

.dock{
position:absolute;
bottom:18px;
left:20px;
right:20px;
height:80px;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

/* APP SCREEN */

.appscreen{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:none;
padding:20px;
box-sizing:border-box;
z-index:10;
}

.back{
margin-bottom:20px;
opacity:0.6;
cursor:pointer;
}

/* CHAOS NOTIFICATION */

.notify{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:white;
padding:12px 20px;
border-radius:14px;
display:none;
}

</style>
</head>

<body>

<div class="phone">

<div class="wallpaper"></div>

<div class="status">
<div id="time"></div>
<div>📶 🔋</div>
</div>

<div class="notify" id="notify"></div>

<!-- HOME PAGES -->

<div class="pages" id="pages">

<div class="page">

<div class="app" onclick="openApp('ai')">
<div class="icon ai">🧠</div>
<div class="label">AI</div>
</div>

<div class="app" onclick="openApp('games')">
<div class="icon games">🎮</div>
<div class="label">Games</div>
</div>

<div class="app" onclick="openApp('chaos')">
<div class="icon chaos">🌌</div>
<div class="label">Chaos</div>
</div>

<div class="app" onclick="openApp('logs')">
<div class="icon logs">📜</div>
<div class="label">Logs</div>
</div>

</div>


<div class="page">

<div class="app" onclick="openApp('browser')">
<div class="icon browser">🌐</div>
<div class="label">Browser</div>
</div>

<div class="app" onclick="openApp('settings')">
<div class="icon settings">⚙</div>
<div class="label">Settings</div>
</div>

</div>

</div>

<!-- DOCK -->

<div class="dock">

<div class="icon ai">🧠</div>
<div class="icon games">🎮</div>
<div class="icon browser">🌐</div>

</div>

<!-- APPS -->

<div class="appscreen" id="ai">

<div class="back" onclick="closeApp()">← Home</div>

<h2>AI</h2>

<input placeholder="Ask something..." style="width:100%;padding:10px;border-radius:10px;border:none">

</div>


<div class="appscreen" id="games">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Dice Game</h2>

<button onclick="dice()">Roll Dice</button>

<h1 id="diceResult"></h1>

</div>


<div class="appscreen" id="browser">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Browser</h2>

<input id="url" placeholder="Enter URL" style="width:80%">
<button onclick="go()">Go</button>

<iframe id="frame" style="width:100%;height:80%;border:none;margin-top:10px"></iframe>

</div>


<div class="appscreen" id="chaos">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Chaos Engine</h2>

<button onclick="chaos()">Trigger Chaos</button>

</div>


<div class="appscreen" id="logs">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Logs</h2>

<p>No logs yet</p>

</div>

</div>


<script>

/* CLOCK */

function clock(){

const d=new Date()
let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')

document.getElementById("time").innerText=h+":"+m

}

setInterval(clock,1000)
clock()

/* SWIPE */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){

pages.style.transform="translateX(-50%)"

}

if(endX-startX>50){

pages.style.transform="translateX(0%)"

}

})

/* OPEN APP */

function openApp(id){

document.getElementById(id).style.display="block"

}

/* CLOSE APP */

function closeApp(){

document.querySelectorAll(".appscreen").forEach(a=>a.style.display="none")

}

/* CHAOS */

function chaos(){

let events=[
"Reality glitch detected",
"Unknown signal from void",
"Chaos level increased",
"System anomaly"
]

let e=events[Math.floor(Math.random()*events.length)]

let n=document.getElementById("notify")

n.innerText=e
n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},3000)

}

/* GAME */

function dice(){

let r=Math.floor(Math.random()*6)+1

document.getElementById("diceResult").innerText=r

}

/* BROWSER */

function go(){

let url=document.getElementById("url").value

document.getElementById("frame").src=url

}

</script>

</body>
</html>
