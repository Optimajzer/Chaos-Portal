<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos OS</title>

<style>

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
}

.phone{
width:340px;
height:680px;
border-radius:40px;
background:black;
box-shadow:0 0 40px black;
overflow:hidden;
position:relative;
}

/* LOCK SCREEN */

.lock{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,#111,#000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.time{
font-size:70px;
font-weight:200;
}

.date{
opacity:0.7;
margin-bottom:40px;
}

.unlock{
margin-top:200px;
font-size:14px;
opacity:0.6;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* HOME SCREEN */

.home{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,#1a1a1a,#000);
padding:25px;
box-sizing:border-box;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.app{
text-align:center;
cursor:pointer;
}

.icon{
width:60px;
height:60px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:26px;
margin-bottom:5px;
}

.ai{background:#3b82f6;}
.games{background:#10b981;}
.chaos{background:#a855f7;}
.logs{background:#f59e0b;}

.label{
font-size:12px;
}

/* DOCK */

.dock{
position:absolute;
bottom:15px;
left:15px;
right:15px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:10px;
display:flex;
justify-content:space-around;
backdrop-filter:blur(10px);
}

.dock .icon{
margin:0;
}

</style>
</head>

<body>

<div class="phone">

<!-- LOCK SCREEN -->

<div class="lock" id="lock">

<div class="time" id="time"></div>

<div class="date" id="date"></div>

<div class="unlock">Swipe up to unlock</div>

</div>


<!-- HOME SCREEN -->

<div class="home" id="home">

<h3>Chaos OS</h3>

<div class="grid">

<div class="app">
<div class="icon ai">🧠</div>
<div class="label">AI</div>
</div>

<div class="app">
<div class="icon games">🎮</div>
<div class="label">Games</div>
</div>

<div class="app">
<div class="icon chaos">🌌</div>
<div class="label">Chaos</div>
</div>

<div class="app">
<div class="icon logs">📜</div>
<div class="label">Logs</div>
</div>

</div>

<div class="dock">

<div class="icon ai">🧠</div>
<div class="icon games">🎮</div>
<div class="icon chaos">🌌</div>

</div>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now=new Date()

const h=String(now.getHours()).padStart(2,'0')
const m=String(now.getMinutes()).padStart(2,'0')

document.getElementById("time").innerText=h+":"+m

document.getElementById("date").innerText=now.toDateString()

}

setInterval(updateClock,1000)

updateClock()


/* UNLOCK */

document.addEventListener("click",function(){

document.getElementById("lock").style.display="none"
document.getElementById("home").style.display="block"

})

</script>

</body>
</html>
