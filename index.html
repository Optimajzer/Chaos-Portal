<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos OS</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PHONE */

.phone{
width:360px;
height:720px;
border-radius:50px;
overflow:hidden;
position:relative;
box-shadow:0 0 80px black;
}

/* WALLPAPER */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 20%,#ff3ec9,transparent 40%),
radial-gradient(circle at 80% 40%,#4c7cff,transparent 40%),
radial-gradient(circle at 40% 90%,#00ffa2,transparent 40%),
black;
}

/* STATUS BAR */

.status{
position:absolute;
top:0;
width:100%;
height:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
box-sizing:border-box;
color:white;
font-size:14px;
z-index:10;
}

/* PAGES */

.pages{
position:absolute;
top:40px;
width:200%;
height:100%;
display:flex;
transition:0.35s;
}

/* PAGE */

.page{
width:100%;
padding:30px;
box-sizing:border-box;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:26px;
color:white;
}

/* APP ICON */

.app{
text-align:center;
cursor:pointer;
}

.icon{
width:64px;
height:64px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:28px;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.label{
font-size:12px;
margin-top:6px;
}

/* COLORS */

.ai{background:linear-gradient(#5fa8ff,#2563eb);}
.games{background:linear-gradient(#34d399,#059669);}
.chaos{background:linear-gradient(#c084fc,#7c3aed);}
.logs{background:linear-gradient(#fbbf24,#f59e0b);}
.browser{background:linear-gradient(#60a5fa,#1d4ed8);}
.settings{background:linear-gradient(#9ca3af,#4b5563);}

/* DOCK */

.dock{
position:absolute;
bottom:18px;
left:20px;
right:20px;
height:80px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

/* APP SCREEN */

.appscreen{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:none;
padding:20px;
box-sizing:border-box;
z-index:20;
}

.back{
margin-bottom:20px;
cursor:pointer;
opacity:0.7;
}

/* CHAOS NOTIFICATION */

.notify{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
padding:10px 20px;
border-radius:14px;
color:white;
display:none;
}

input,button{
padding:10px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<div class="phone">

<div class="wallpaper"></div>

<div class="status">
<div id="clock"></div>
<div>📶 🔋</div>
</div>

<div class="notify" id="notify"></div>

<!-- HOME PAGES -->

<div class="pages" id="pages">

<div class="page">

<div class="app" onclick="openApp('ai')">
<div class="icon ai">🧠</div>
<div class="label">AI</div>
</div>

<div class="app" onclick="openApp('games')">
<div class="icon games">🎮</div>
<div class="label">Games</div>
</div>

<div class="app" onclick="openApp('chaos')">
<div class="icon chaos">🌌</div>
<div class="label">Chaos</div>
</div>

<div class="app" onclick="openApp('logs')">
<div class="icon logs">📜</div>
<div class="label">Logs</div>
</div>

</div>

<div class="page">

<div class="app" onclick="openApp('browser')">
<div class="icon browser">🌐</div>
<div class="label">Browser</div>
</div>

<div class="app" onclick="openApp('settings')">
<div class="icon settings">⚙</div>
<div class="label">Settings</div>
</div>

</div>

</div>

<!-- DOCK -->

<div class="dock">

<div class="icon ai">🧠</div>
<div class="icon games">🎮</div>
<div class="icon browser">🌐</div>

</div>

<!-- AI APP -->

<div class="appscreen" id="ai">

<div class="back" onclick="closeApp()">← Home</div>

<h2>AI Chat</h2>

<input id="aiInput" placeholder="Ask something...">
<button onclick="ai()">Send</button>

<p id="aiOutput"></p>

</div>

<!-- GAME -->

<div class="appscreen" id="games">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Dice Game</h2>

<button onclick="dice()">Roll</button>

<h1 id="dice"></h1>

</div>

<!-- BROWSER -->

<div class="appscreen" id="browser">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Browser</h2>

<input id="url" placeholder="https://">
<button onclick="go()">Open</button>

</div>

<!-- CHAOS -->

<div class="appscreen" id="chaos">

<div class="back" onclick="closeApp()">← Home</div>

<h2>Chaos Engine</h2>

<button onclick="chaos()">Trigger Chaos</button>

</div>

<!-- LOGS -->

<div class="appscreen" id="logs">

<div class="back" onclick="closeApp()">← Home</div>

<h2>System Logs</h2>

<p>No logs yet</p>

</div>

</div>

<script>

/* CLOCK */

function clock(){

let d=new Date()

let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')

document.getElementById("clock").innerText=h+":"+m

}

setInterval(clock,1000)
clock()

/* SWIPE */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
pages.style.transform="translateX(-50%)"
}

if(endX-startX>50){
pages.style.transform="translateX(0%)"
}

})

/* APPS */

function openApp(id){
document.getElementById(id).style.display="block"
}

function closeApp(){
document.querySelectorAll(".appscreen").forEach(a=>a.style.display="none")
}

/* CHAOS */

function chaos(){

let events=[
"Reality glitch detected",
"Unknown signal",
"Chaos level rising",
"System anomaly"
]

let e=events[Math.floor(Math.random()*events.length)]

let n=document.getElementById("notify")

n.innerText=e
n.style.display="block"

setTimeout(()=>n.style.display="none",3000)

}

/* GAME */

function dice(){
document.getElementById("dice").innerText=Math.floor(Math.random()*6)+1
}

/* BROWSER */

function go(){

let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

window.open(url)

}

/* AI */

function ai(){

let q=document.getElementById("aiInput").value.toLowerCase()

let answers={
hello:"Hello human.",
hi:"Hi.",
chaos:"Chaos is everywhere.",
who:"I am Chaos AI.",
help:"Try asking about chaos."
}

let a="I don't understand."

for(let k in answers){
if(q.includes(k)){a=answers[k]}
}

document.getElementById("aiOutput").innerText=a

}

</script>

</body>
</html>
